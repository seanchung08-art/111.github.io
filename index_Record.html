<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>比重 / 溫度 記錄表</title>
    <style>
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { margin: 20px; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin: 12px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        label { width: 90px; font-weight: bold; }
        select, input { padding: 6px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 6px; color: white; }
        .btn-confirm { background: #4CAF50; }
        .btn-delete { background: #f44336; }
        .btn-download { background: #2196F3; }
        .btn-refresh { background: #ff9800; }
        .page-btn { padding: 5px 10px; margin: 0 4px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #333; }
        th, td { padding: 8px; text-align: center; }
        th { background: #e8e8e8; }
        tr:hover { background: #f0f8ff; cursor: pointer; }
        .pagination { margin-top: 15px; text-align: center; }
        .status { padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        #otherUnit { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>比重 / 溫度 記錄表</h2>
    <div id="status" class="status"></div>

    <div class="form-group">
        <label>量測日期：</label>
        <select id="year"></select>/<select id="month"></select>/<select id="day"></select>
    </div>
    <div class="form-group">
        <label>量測時間：</label>
        <select id="hour"></select>:<select id="minute"></select>
    </div>
    <div class="form-group">
        <label>單元名稱：</label>
        <select id="unit">
            <option value="原液坑一">原液坑一</option>
            <option value="原液坑二">原液坑二</option>
            <option value="VVCC#A">VVCC#A</option>
            <option value="VVCC#B">VVCC#B</option>
            <option value="VVCC#C">VVCC#C</option>
            <option value="結晶罐#A">結晶罐#A</option>
            <option value="結晶罐#B">結晶罐#B</option>
            <option value="結晶罐#C">結晶罐#C</option>
            <option value="濃縮液槽">濃縮液槽</option>
            <option value="應急坑">應急坑</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" id="otherUnit" placeholder="自訂單元">
    </div>
    <div class="form-group">
        <label>比重：</label>
        <input type="number" id="density" step="0.001" placeholder="例：1.025">
    </div>
    <div class="form-group">
        <label>溫度：</label>
        <input type="number" id="temp" placeholder="例：28">
    </div>
    <div class="form-group">
        <label>測量者：</label>
        <input type="text" id="user" placeholder="姓名">
    </div>

    <button class="btn btn-confirm" onclick="saveData()">確認送出</button>
    <button class="btn btn-delete" onclick="deleteData()">刪除選取</button>
    <button class="btn btn-download" onclick="exportCSV()">下載CSV</button>
    <button class="btn btn-refresh" onclick="loadData()">重新整理</button>

    <table>
        <thead>
            <tr>
                <th>日期</th><th>時間</th><th>單元</th><th>比重</th><th>溫度</th><th>測量者</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="pagination">
        <button class="page-btn" onclick="prevPage()">上一頁</button>
        <span id="pageInfo">第 1 頁 / 共 1 頁</span>
        <button class="page-btn" onclick="nextPage()">下一頁</button>
    </div>
</div>

<script>
// ===================== 你只需要填這 3 個 =====================
const GIST_ID = "933258a9b4a1e36b29d8613285ba8b72";
const TOKEN  = "ghp_你自己的真實Token";
// ============================================================

const FILE = "data.json";
let records = [];
let currentPage = 1;
const pageSize = 100;
let selectedIndex = -1;

function setStatus(msg, err=false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = err ? "status error" : "status success";
}

function initDateTime() {
    const y = document.getElementById("year");
    for(let i=110;i<=120;i++){ let o=document.createElement("option"); o.value=o.textContent=i; y.appendChild(o); }
    const m = document.getElementById("month");
    for(let i=1;i<=12;i++){ let o=document.createElement("option"); let v=String(i).padStart(2,"0"); o.value=o.textContent=v; m.appendChild(o); }
    const d = document.getElementById("day");
    for(let i=1;i<=31;i++){ let o=document.createElement("option"); let v=String(i).padStart(2,"0"); o.value=o.textContent=v; d.appendChild(o); }
    const h = document.getElementById("hour");
    for(let i=0;i<24;i++){ let o=document.createElement("option"); let v=String(i).padStart(2,"0"); o.value=o.textContent=v; h.appendChild(o); }
    const i = document.getElementById("minute");
    ["00","10","20","30","40","50"].forEach(v=>{ let o=document.createElement("option"); o.value=o.textContent=v; i.appendChild(o); });
}

async function loadData() {
    setStatus("載入中...");
    try {
        const r = await fetch(`https://api.github.com/gists/${GIST_ID}`);
        const g = await r.json();
        const c = g.files[FILE].content;
        records = JSON.parse(c);
        renderTable();
        setStatus("載入完成");
    } catch(e) {
        setStatus("本機模式啟用", false);
        const d = localStorage.getItem("density");
        records = d ? JSON.parse(d) : [];
        renderTable();
    }
}

function saveLocal() {
    localStorage.setItem("density", JSON.stringify(records));
}

function renderTable() {
    const b = document.getElementById("tableBody");
    const t = Math.ceil(records.length/pageSize);
    const s = (currentPage-1)*pageSize;
    const data = records.slice(s, s+pageSize);
    b.innerHTML = "";
    data.forEach((item,i)=>{
        const tr = document.createElement("tr");
        tr.onclick = ()=>{ selectedIndex=s+i; fill(item); };
        tr.innerHTML = `<td>${item.date}</td><td>${item.time}</td><td>${item.unit}</td><td>${item.density}</td><td>${item.temp}</td><td>${item.user}</td>`;
        b.appendChild(tr);
    });
    document.getElementById("pageInfo").textContent = `第 ${currentPage} 頁 / 共 ${t} 頁`;
}

function fill(item) {
    const [y,m,d] = item.date.split("/");
    const [h,i] = item.time.split(":");
    document.getElementById("year").value=y;
    document.getElementById("month").value=m;
    document.getElementById("day").value=d;
    document.getElementById("hour").value=h;
    document.getElementById("minute").value=i;
    const u = document.getElementById("unit");
    const o = document.getElementById("otherUnit");
    if(item.unit.startsWith("其他")){
        u.value="其他";
        o.style.display="inline";
        o.value=item.unit.replace(/其他\((.*)\)/,"$1");
    }else{
        u.value=item.unit;
        o.style.display="none";
        o.value="";
    }
    document.getElementById("density").value=item.density;
    document.getElementById("temp").value=item.temp;
    document.getElementById("user").value=item.user;
}

function saveData() {
    const date = `${document.getElementById("year").value}/${document.getElementById("month").value}/${document.getElementById("day").value}`;
    const time = `${document.getElementById("hour").value}:${document.getElementById("minute").value}`;
    let unit = document.getElementById("unit").value;
    const other = document.getElementById("otherUnit").value.trim();
    const density = document.getElementById("density").value.trim();
    const temp = document.getElementById("temp").value.trim();
    const user = document.getElementById("user").value.trim();

    if(unit==="其他" && !other) return alert("請輸入單元");
    if(!density||!temp||!user) return alert("請填完整");
    if(unit==="其他") unit=`其他(${other})`;

    const item = { date, time, unit, density, temp, user };
    if(selectedIndex>=0){
        records[selectedIndex]=item;
        selectedIndex=-1;
    }else{
        records.unshift(item);
    }
    saveLocal();
    renderTable();
    clear();
    setStatus("已儲存");
}

function clear() {
    document.getElementById("density").value="";
    document.getElementById("temp").value="";
    document.getElementById("user").value="";
    document.getElementById("otherUnit").value="";
    document.getElementById("otherUnit").style.display="none";
    selectedIndex=-1;
}

function deleteData() {
    if(selectedIndex<0) return alert("請點選資料");
    if(!confirm("確定刪除？")) return;
    records.splice(selectedIndex,1);
    selectedIndex=-1;
    saveLocal();
    renderTable();
    setStatus("已刪除");
}

function prevPage(){ if(currentPage>1){currentPage--;renderTable();} }
function nextPage(){ const t=Math.ceil(records.length/pageSize); if(currentPage<t){currentPage++;renderTable();} }

function exportCSV() {
    if(records.length===0) return alert("無資料");
    let csv = "日期,時間,單元,比重,溫度,測量者\n";
    records.forEach(r=>{ csv+=`${r.date},${r.time},${r.unit},${r.density},${r.temp},${r.user}\n`; });
    const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="比重記錄表.csv";
    a.click();
}

document.getElementById("unit").addEventListener("change",function(){
    document.getElementById("otherUnit").style.display = this.value==="其他"?"inline":"none";
});

window.onload=()=>{ initDateTime(); loadData(); };
</script>
</body>
</html>
