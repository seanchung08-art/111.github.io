<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比重溫度記錄表</title>
    <style>
        *{box-sizing:border-box;font-family:"Microsoft JhengHei",sans-serif}
        body{margin:10px;background:#f5f5f5}
        .container{max-width:1000px;margin:auto;background:white;padding:15px;border-radius:8px}
        .form-group{margin:10px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        label{font-weight:bold;min-width:fit-content;margin-right:5px}
        select,input{padding:6px;border:1px solid #ccc;border-radius:4px;font-size:16px}
        .btn{padding:8px 14px;margin:5px 3px;border:none;border-radius:5px;color:white;cursor:pointer}
        .btn-confirm{background:#4CAF50}
        .btn-refresh{background:#ff9800}
        .btn-clear{background:#607D8B}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #333;padding:8px;text-align:center}
        th{background:#eaeaea}
        tr:hover{background:#f0f8ff;cursor:pointer}
        .status{padding:8px;border-radius:5px;margin-bottom:10px}
        .success{background:#e8f5e9;color:#2e7d32}
        .error{background:#ffebee;color:#c62828}
        #otherUnit{display:none}
        .edit-info{color:#1a73e8;font-size:14px;margin-bottom:8px}
    </style>
</head>
<body>
<div class="container">
    <h2>比重 / 溫度記錄表</h2>
    <div id="editTip" class="edit-info"></div>
    <div id="status" class="status">讀取中...</div>

    <div class="form-group">
        <label>量測日期：</label>
        <select id="year"></select> / <select id="month"></select> / <select id="day"></select>
    </div>
    <div class="form-group">
        <label>量測時間：</label>
        <select id="hour"></select> : <select id="minute"></select>
    </div>
    <div class="form-group">
        <label>單元名稱：</label>
        <select id="unit">
            <option value="原液坑一">原液坑一</option>
            <option value="原液坑二">原液坑二</option>
            <option value="VVCC#A">VVCC#A</option>
            <option value="VVCC#B">VVCC#B</option>
            <option value="VVCC#C">VVCC#C</option>
            <option value="結晶罐#A">結晶罐#A</option>
            <option value="結晶罐#B">結晶罐#B</option>
            <option value="結晶罐#C">結晶罐#C</option>
            <option value="濃縮液槽">濃縮液槽</option>
            <option value="應急坑">應急坑</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" id="otherUnit" placeholder="自訂單元">
    </div>
    <div class="form-group">
        <label>比重：</label>
        <input type="number" step="0.001" id="density" placeholder="例：1.025">
    </div>
    <div class="form-group">
        <label>溫度：</label>
        <input type="number" id="temp" placeholder="例：28">
    </div>
    <div class="form-group">
        <label>測量者：</label>
        <input type="text" id="user" placeholder="姓名">
    </div>
    <div class="form-group">
        <label>備註：</label>
        <input type="text" id="note" placeholder="請輸入備註">
    </div>

    <button class="btn btn-confirm" onclick="saveData()">確認送出</button>
    <button class="btn btn-refresh" onclick="loadFromSheet()">重新整理</button>
    <button class="btn btn-clear" onclick="clearForm()">取消編輯</button>

    <table>
        <thead>
            <tr>
                <th>日期</th><th>時間</th><th>單元</th><th>比重</th><th>溫度</th><th>測量者</th><th>備註</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
// ======================
// 你的 Google Script 網址
// ======================
const API_URL = "https://script.google.com/macros/s/AKfycbxxOfjgFZE1cZz0R-B4H1CZK4C1833A3ZR4wtZCd0PhGtafopaDkcgHoeP6BdbyvIj6/exec";

let records = [];
let editIndex = -1;

// 狀態
const setStatus = (msg, err=false) => {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = err ? "status error" : "status success";
};
const setEditTip = (msg) => document.getElementById("editTip").textContent = msg;

// 日期時間初始化（極速版）
const initDateTime = () => {
  const now = new Date();
  const roc = now.getFullYear() - 1911;
  const fill = (n) => String(n).padStart(2,"0");

  // 年
  const y = document.getElementById("year");
  for(let i=roc-2;i<=roc+1;i++){
    const opt = document.createElement("option");
    opt.value=opt.textContent=i;
    if(i===roc) opt.selected=true;
    y.appendChild(opt);
  }
  // 月
  const m = document.getElementById("month");
  for(let i=1;i<=12;i++){
    const v=fill(i);
    const opt=document.createElement("option");
    opt.value=opt.textContent=v;
    if(i===now.getMonth()+1) opt.selected=true;
    m.appendChild(opt);
  }
  // 日
  const d = document.getElementById("day");
  for(let i=1;i<=31;i++){
    const v=fill(i);
    const opt=document.createElement("option");
    opt.value=opt.textContent=v;
    if(i===now.getDate()) opt.selected=true;
    d.appendChild(opt);
  }
  // 時
  const h = document.getElementById("hour");
  for(let i=0;i<24;i++){
    const v=fill(i);
    const opt=document.createElement("option");
    opt.value=opt.textContent=v;
    if(i===now.getHours()) opt.selected=true;
    h.appendChild(opt);
  }
  // 分
  const min = document.getElementById("minute");
  ["00","10","20","30","40","50"].forEach(v=>{
    const opt=document.createElement("option");
    opt.value=opt.textContent=v;
    if(v===fill(Math.floor(now.getMinutes()/10)*10)) opt.selected=true;
    min.appendChild(opt);
  });
};

// 表格渲染（極速）
const renderTable = () => {
  const tb = document.getElementById("tableBody");
  tb.innerHTML = records.map((item,i)=>`
    <tr onclick="editRow(${i})">
      <td>${item.date}</td>
      <td>${item.time}</td>
      <td>${item.unit}</td>
      <td>${item.density}</td>
      <td>${item.temp}</td>
      <td>${item.user}</td>
      <td>${item.note||""}</td>
    </tr>
  `).join("");
};

// 編輯
const editRow = (i) => {
  editIndex = i;
  const item = records[i];
  const [y,m,d] = item.date.split("/");
  const [h,mi] = item.time.split(":");
  document.getElementById("year").value=y;
  document.getElementById("month").value=m;
  document.getElementById("day").value=d;
  document.getElementById("hour").value=h;
  document.getElementById("minute").value=mi;
  document.getElementById("density").value=item.density;
  document.getElementById("temp").value=item.temp;
  document.getElementById("user").value=item.user;
  document.getElementById("note").value=item.note||"";

  const unit = item.unit;
  if(unit.startsWith("其他(")){
    document.getElementById("unit").value="其他";
    document.getElementById("otherUnit").style.display="inline-block";
    document.getElementById("otherUnit").value=unit.replace(/其他\((.*)\)/,"$1");
  }else{
    document.getElementById("unit").value=unit;
    document.getElementById("otherUnit").style.display="none";
    document.getElementById("otherUnit").value="";
  }
  setEditTip(`編輯第 ${i+1} 筆`);
};

// 讀取試算表（極速 + 民國日期格式）
const loadFromSheet = async () => {
  setStatus("讀取中...");
  try {
    const res = await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"load"})});
    const json = await res.json();
    if(json.status==="ok"){
      records=json.data;
      renderTable();
      setStatus(`✅ 已載入 ${records.length} 筆`);
    }else{
      setStatus("⚠️ 讀取失敗",true);
    }
  }catch(e){
    setStatus("❌ 連線失敗",true);
  }
};

// 儲存
const saveData = async () => {
  const date = `${document.getElementById("year").value}/${document.getElementById("month").value}/${document.getElementById("day").value}`;
  const time = `${document.getElementById("hour").value}:${document.getElementById("minute").value}`;
  let unit = document.getElementById("unit").value;
  const other = document.getElementById("otherUnit").value.trim();
  const density = document.getElementById("density").value.trim();
  const temp = document.getElementById("temp").value.trim();
  const user = document.getElementById("user").value.trim();
  const note = document.getElementById("note").value.trim();

  if(unit==="其他" && !other) return alert("請輸入自訂單元");
  if(!density||!temp||!user) return alert("請填寫完整");
  if(unit==="其他") unit=`其他(${other})`;

  const data = {date,time,unit,density,temp,user,note};
  const action = editIndex>=0 ? "update" : "add";
  if(action==="update") data.rowIndex=editIndex;

  await fetch(API_URL,{method:"POST",body:JSON.stringify({action,...data})});
  await loadFromSheet();
  clearForm();
};

// 清空
const clearForm = () => {
  document.getElementById("density").value="";
  document.getElementById("temp").value="";
  document.getElementById("user").value="";
  document.getElementById("note").value="";
  document.getElementById("otherUnit").value="";
  document.getElementById("unit").value="原液坑一";
  document.getElementById("otherUnit").style.display="none";
  editIndex=-1;
  setEditTip("");
};

// 其他單元
document.getElementById("unit").addEventListener("change",function(){
  document.getElementById("otherUnit").style.display=this.value==="其他"?"inline-block":"none";
});

// 啟動
window.onload=async()=>{initDateTime();await loadFromSheet();};
</script>
</body>
</html>
