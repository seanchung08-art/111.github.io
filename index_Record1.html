<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>比重溫度記錄</title>
  <style>
    *{box-sizing:border-box;font-family:微軟正黑體}
    body{margin:15px;background:#f7f7f7}
    .container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:8px}
    .form-group{margin:10px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    label{min-width:80px;font-weight:bold}
    select,input{padding:6px;border:1px solid #ccc;border-radius:4px;width:120px}
    button{padding:8px 16px;background:#4CAF50;color:#fff;border:none;border-radius:4px;cursor:pointer}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{border:1px solid #ddd;padding:8px;text-align:center}
    th{background:#f0f0f0}
    .status{padding:10px;margin:10px 0;border-radius:4px}
    .success{background:#e8f5e9;color:#2e7d32}
    .error{background:#ffebee;color:#c62828}
  </style>
</head>
<body>
<div class="container">
  <h2>比重 / 溫度記錄表</h2>
  <div id="status" class="status">請填寫資料後點「確認送出」</div>

  <div class="form-group">
    <label>日期：</label>
    <select id="y"></select>/<select id="m"></select>/<select id="d"></select>
  </div>
  <div class="form-group">
    <label>時間：</label>
    <select id="h"></select>:<select id="mi"></select>
  </div>
  <div class="form-group">
    <label>單元：</label>
    <select id="unit">
      <option>原液坑一</option><option>原液坑二</option><option>VVCC#A</option>
      <option>VVCC#B</option><option>VVCC#C</option><option>結晶罐#A</option>
      <option>結晶罐#B</option><option>結晶罐#C</option><option>濃縮液槽</option>
      <option>應急坑</option><option>其他</option>
    </select>
    <input type="text" id="other" placeholder="自訂單元" style="display:none;width:160px">
  </div>
  <div class="form-group">
    <label>比重：</label><input type="number" step="0.001" id="density">
  </div>
  <div class="form-group">
    <label>溫度：</label><input type="number" id="temp">
  </div>
  <div class="form-group">
    <label>測量者：</label><input type="text" id="user">
  </div>
  <div class="form-group">
    <label>備註：</label><input type="text" id="note">
  </div>

  <button onclick="submitData()">確認送出</button>

  <table>
    <thead>
      <tr><th>日期</th><th>時間</th><th>單元</th><th>比重</th><th>溫度</th><th>測量者</th><th>備註</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
// 🔴 务必替换成你的 GAS 网址（/exec 结尾）
const API_URL = "https://script.google.com/macros/s/AKfycbzTgJ9fQsZDN6h-J2dZ82GrkhRhtjnu99huujf1sYdko1h5t-miv8TgAhnsKtho1Sks/exec";

// 初始化日期时间
function initDateTime() {
  const now = new Date();
  const roc = now.getFullYear() - 1911;
  const pad = n => String(n).padStart(2, "0");

  // 年
  const y = document.getElementById("y");
  for (let i = 110; i <= 130; i++) {
    const opt = document.createElement("option");
    opt.value = i; opt.textContent = i;
    if (i === roc) opt.selected = true;
    y.appendChild(opt);
  }
  // 月
  const m = document.getElementById("m");
  for (let i = 1; i <= 12; i++) {
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    if (i === now.getMonth() + 1) opt.selected = true;
    m.appendChild(opt);
  }
  // 日
  const d = document.getElementById("d");
  for (let i = 1; i <= 31; i++) {
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    if (i === now.getDate()) opt.selected = true;
    d.appendChild(opt);
  }
  // 时
  const h = document.getElementById("h");
  for (let i = 0; i < 24; i++) {
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    if (i === now.getHours()) opt.selected = true;
    h.appendChild(opt);
  }
  // 分
  const mi = document.getElementById("mi");
  for (let i = 0; i < 60; i += 5) {
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    mi.appendChild(opt);
  }
}

// 切换其他单元
document.getElementById("unit").addEventListener("change", function () {
  document.getElementById("other").style.display = this.value === "其他" ? "inline" : "none";
});

// 状态提示
function setStatus(msg, isError = false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = isError ? "status error" : "status success";
}

// ✅ 核心：提交（用 FormData 彻底解决 CORS/网络错误）
async function submitData() {
  // 1. 取值
  const date = `${document.getElementById("y").value}/${document.getElementById("m").value}/${document.getElementById("d").value}`;
  const time = `${document.getElementById("h").value}:${document.getElementById("mi").value}`;
  let unit = document.getElementById("unit").value;
  const other = document.getElementById("other").value.trim();
  const density = document.getElementById("density").value.trim();
  const temp = document.getElementById("temp").value.trim();
  const user = document.getElementById("user").value.trim();
  const note = document.getElementById("note").value.trim();

  // 2. 校验
  if (unit === "其他" && !other) return alert("請輸入自訂單元");
  if (!density || !temp || !user) return alert("請填寫完整");
  if (unit === "其他") unit = `其他(${other})`;

  // 3. 准备数据
  const row = [date, time, unit, density, temp, user, note];
  setStatus("送出中...");

  try {
    // ✅ 关键：用 FormData 提交（不会触发 CORS 预检，100%解决网络错误）
    const formData = new FormData();
    formData.append("data", JSON.stringify({
      action: "add", date, time, unit, density, temp, user, note
    }));

    const res = await fetch(API_URL, {
      method: "POST",
      body: formData // 不设 Content-Type，浏览器自动处理
    });

    const result = await res.json();
    if (result.status === "success") {
      // 加到表格最上方
      const tbody = document.getElementById("tableBody");
      const tr = document.createElement("tr");
      tr.innerHTML = row.map(col => `<td>${col}</td>`).join("");
      tbody.insertBefore(tr, tbody.firstChild);

      // 清空表单
      document.getElementById("density").value = "";
      document.getElementById("temp").value = "";
      document.getElementById("user").value = "";
      document.getElementById("note").value = "";
      document.getElementById("other").value = "";
      document.getElementById("unit").value = "原液坑一";
      document.getElementById("other").style.display = "none";

      setStatus("✅ 送出成功！已顯示並存入試算表");
    } else {
      setStatus("❌ 送出失敗：" + result.msg, true);
    }
  } catch (err) {
    console.error(err);
    setStatus("❌ 網路錯誤，請檢查：GAS 部署/URL/權限", true);
  }
}

window.onload = initDateTime;
</script>
</body>
</html>
