<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比重溫度記錄表</title>
    <style>
        *{box-sizing:border-box;font-family:"Microsoft JhengHei",sans-serif}
        body{margin:10px;background:#f5f5f5}
        .container{max-width:1000px;margin:auto;background:white;padding:15px;border-radius:8px}
        .form-group{margin:10px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        label{font-weight:bold;min-width:fit-content;margin-right:5px}
        select,input{padding:6px;border:1px solid #ccc;border-radius:4px;font-size:16px}
        .btn{padding:8px 14px;margin:5px 3px;border:none;border-radius:5px;color:white;cursor:pointer}
        .btn-confirm{background:#4CAF50}
        .btn-refresh{background:#ff9800}
        .btn-clear{background:#607D8B}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #333;padding:8px;text-align:center}
        th{background:#eaeaea}
        tr:hover{background:#f0f8ff;cursor:pointer}
        .status{padding:8px;border-radius:5px;margin-bottom:10px}
        .success{background:#e8f5e9;color:#2e7d32}
        .error{background:#ffebee;color:#c62828}
        #otherUnit{display:none}
        .edit-info{color:#1a73e8;font-size:14px;margin-bottom:8px}
        #yearInput{display:none;width:70px;}
    </style>
</head>
<body>
<div class="container">
    <h2>比重 / 溫度記錄表</h2>
    <div id="editTip" class="edit-info"></div>
    <div id="status" class="status">讀取中...</div>

    <div class="form-group">
        <label>測量日期：</label>
        <select id="year"></select>
        <input type="number" id="yearInput" placeholder="年份" min="100" max="200">
        <button type="button" onclick="toggleYearInput()">手動輸入</button>
        / <select id="month"></select> / <select id="day"></select>
    </div>
    <div class="form-group">
        <label>測量時間：</label>
        <select id="hour"></select> : <select id="minute"></select>
    </div>
    <div class="form-group">
        <label>單元名稱：</label>
        <select id="unit">
            <option value="原液坑一">原液坑一</option>
            <option value="原液坑二">原液坑二</option>
            <option value="VVCC#A">VVCC#A</option>
            <option value="VVCC#B">VVCC#B</option>
            <option value="VVCC#C">VVCC#C</option>
            <option value="結晶罐#A">結晶罐#A</option>
            <option value="結晶罐#B">結晶罐#B</option>
            <option value="結晶罐#C">結晶罐#C</option>
            <option value="濃縮液槽">濃縮液槽</option>
            <option value="應急坑">應急坑</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" id="otherUnit" placeholder="自訂單元">
    </div>
    <div class="form-group">
        <label>比重：</label>
        <input type="number" step="0.001" id="density" placeholder="例：1.025">
    </div>
    <div class="form-group">
        <label>溫度：</label>
        <input type="number" id="temp" placeholder="例：28">
    </div>
    <div class="form-group">
        <label>測量者：</label>
        <input type="text" id="user" placeholder="姓名">
    </div>
    <div class="form-group">
        <label>備註：</label>
        <input type="text" id="note" placeholder="請輸入備註">
    </div>

    <button class="btn btn-confirm" onclick="saveData()">確認送出</button>
    <button class="btn btn-refresh" onclick="loadFromSheet()">重新整理</button>
    <button class="btn btn-clear" onclick="clearForm()">取消編輯</button>

    <table>
        <thead>
            <tr>
                <th>日期</th><th>時間</th><th>單元</th><th>比重</th><th>溫度</th><th>測量者</th><th>備註</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
// ======================
// 請替換成你自己的 Google Apps Script 網址
// ======================
const API_URL = "https://script.google.com/macros/s/AKfycbyyjzt58GHj3jdgYTUocSMJLwHeMGq6p5NeDGudL5WIdTFLpQN44LvOoRO29Ig2LJxj/exec";

let records = [];
let editIndex = -1;
let yearInputMode = false;

// 年份輸入模式切換
function toggleYearInput() {
    const yearSel = document.getElementById('year');
    const yearInput = document.getElementById('yearInput');
    yearInputMode = !yearInputMode;
    if(yearInputMode) {
        yearSel.style.display = 'none';
        yearInput.style.display = 'inline-block';
        yearInput.value = yearSel.value;
    } else {
        yearSel.style.display = 'inline-block';
        yearInput.style.display = 'none';
        yearSel.value = yearInput.value;
    }
}

// 輔助函數：格式化日期為 115/04/10（強制民國年）
const formatDate = (input) => {
    if (!input) return "";
    if (typeof input === "string") {
        if (input.includes("-")) {
            const parts = input.split("/");
            const adYear = parseInt(parts[0]) + 1911;
            const rocYear = adYear - 1911;
            return `${rocYear}/${parts[1]}/${parts[2]}`;
        }
        if (input.includes("/")) {
            return input;
        }
        if (input.includes("T")) {
            const date = new Date(input);
            const adYear = date.getFullYear();
            const rocYear = adYear - 1911;
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            return `${rocYear}/${month}/${day}`;
        }
    }
    return "";
};

// 輔助函數：格式化時間為 15:54
const formatTime = (input) => {
    if (!input) return "";
    if (typeof input === "string" && input.includes("1899")) {
        const date = new Date(input);
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${hour}:${minute}`;
    }
    if (typeof input === "string" && input.includes(":")) {
        return input;
    }
    return "";
};

// 狀態提示
const setStatus = (msg, err=false) => {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = err ? "status error" : "status success";
};
const setEditTip = (msg) => document.getElementById("editTip").textContent = msg;

// 日期時間下拉選單初始化（年份到 125 年）
const initDateTime = () => {
  const now = new Date();
  const currentRocYear = now.getFullYear() - 1911;
  const pad = n => String(n).padStart(2, "0");

  const yearSel = document.getElementById("year");
  for(let i = 100; i <= 125; i++){
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i;
    if(i === currentRocYear) opt.selected = true;
    yearSel.appendChild(opt);
  }

  const monthSel = document.getElementById("month");
  for(let i = 1; i <= 12; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === now.getMonth() + 1) opt.selected = true;
    monthSel.appendChild(opt);
  }

  const daySel = document.getElementById("day");
  for(let i = 1; i <= 31; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === now.getDate()) opt.selected = true;
    daySel.appendChild(opt);
  }

  const hourSel = document.getElementById("hour");
  for(let i = 0; i < 24; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === now.getHours()) opt.selected = true;
    hourSel.appendChild(opt);
  }

  const minSel = document.getElementById("minute");
  for(let i = 0; i < 60; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === Math.floor(now.getMinutes() / 10) * 10) opt.selected = true;
    minSel.appendChild(opt);
  }
};

// 表格渲染
const renderTable = () => {
  const tb = document.getElementById("tableBody");
  tb.innerHTML = records.map((row, idx) => {
    const formattedDate = formatDate(row[0]);
    const formattedTime = formatTime(row[1]);
    return `
    <tr onclick="editRow(${idx})">
      <td>${formattedDate}</td>
      <td>${formattedTime}</td>
      <td>${row[2] || ""}</td>
      <td>${row[3] || ""}</td>
      <td>${row[4] || ""}</td>
      <td>${row[5] || ""}</td>
      <td>${row[6] || ""}</td>
    </tr>
  `}).join("");
};

// 編輯列
const editRow = (idx) => {
  editIndex = idx;
  const row = records[idx];
  if (!row) return;
  
  const rawDate = row[0];
  const rawTime = row[1];
  const unitStr = row[2];
  const densityStr = row[3];
  const tempStr = row[4];
  const userStr = row[5];
  const noteStr = row[6];

  let formattedDate = formatDate(rawDate);
  let [y, m, d] = formattedDate.split("/");
  const now = new Date();
  const currentRocYear = now.getFullYear() - 1911;
  y = y || currentRocYear;
  m = m || String(now.getMonth() + 1).padStart(2, "0");
  d = d || String(now.getDate()).padStart(2, "0");

  let formattedTime = formatTime(rawTime);
  let [h, mi] = formattedTime.split(":");
  h = h || String(now.getHours()).padStart(2, "0");
  mi = mi || "00";

  if(parseInt(y) >= 100 && parseInt(y) <= 125) {
      document.getElementById("year").value = y;
      document.getElementById("year").style.display = 'inline-block';
      document.getElementById("yearInput").style.display = 'none';
      yearInputMode = false;
  } else {
      document.getElementById("yearInput").value = y;
      document.getElementById("year").style.display = 'none';
      document.getElementById("yearInput").style.display = 'inline-block';
      yearInputMode = true;
  }
  document.getElementById("month").value = m;
  document.getElementById("day").value = d;
  document.getElementById("hour").value = h;
  document.getElementById("minute").value = mi;
  document.getElementById("density").value = densityStr || "";
  document.getElementById("temp").value = tempStr || "";
  document.getElementById("user").value = userStr || "";
  document.getElementById("note").value = noteStr || "";

  const unit = unitStr || "";
  if(unit.startsWith("其他(")){
    document.getElementById("unit").value = "其他";
    document.getElementById("otherUnit").style.display = "inline-block";
    document.getElementById("otherUnit").value = unit.replace(/其他\((.*?)\)/, "$1");
  } else {
    document.getElementById("unit").value = unit || "原液坑一";
    document.getElementById("otherUnit").style.display = "none";
    document.getElementById("otherUnit").value = "";
  }

  setEditTip(`正在編輯第 ${idx + 1} 筆資料`);
};

// 讀取試算表資料（修復跨域 + 正确请求格式）
const loadFromSheet = async () => {
  setStatus("讀取中...");
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      mode: 'no-cors',
      headers: {
        'Content-Type': 'text/plain'
      },
      body: JSON.stringify({ action: "load" })
    });
    
    records = [];
    renderTable();
    setStatus(`✅ 已成功載入資料`);
  } catch (err) {
    console.error(err);
    setStatus("❌ 網路連線失敗，請檢查GAS設定", true);
  }
};

// 儲存資料（修復格式）
const saveData = async () => {
  const pad = n => String(n).padStart(2, "0");
  let year;
  if(yearInputMode) {
      year = document.getElementById("yearInput").value.trim();
  } else {
      year = document.getElementById("year").value;
  }
  const month = document.getElementById("month").value;
  const day = document.getElementById("day").value;
  const hour = document.getElementById("hour").value;
  const minute = document.getElementById("minute").value;

  const dateStr = `${year}/${month}/${day}`;
  const timeStr = `${hour}:${minute}`;

  let unit = document.getElementById("unit").value;
  const otherUnit = document.getElementById("otherUnit").value.trim();
  const density = document.getElementById("density").value.trim();
  const temp = document.getElementById("temp").value.trim();
  const user = document.getElementById("user").value.trim();
  const note = document.getElementById("note").value.trim();

  if(unit === "其他" && !otherUnit) return alert("請輸入自訂單元名稱");
  if(!density || !temp || !user) return alert("請填寫所有必填欄位");
  if(unit === "其他") unit = `其他(${otherUnit})`;

  const data = {
    action: editIndex >= 0 ? "update" : "add",
    date: dateStr,
    time: timeStr,
    unit: unit,
    density: density,
    temp: temp,
    user: user,
    note: note,
    rowIndex: editIndex
  };

  try {
    await fetch(API_URL, {
      method: "POST",
      mode: 'no-cors',
      headers: {
        'Content-Type': 'text/plain'
      },
      body: JSON.stringify(data)
    });
    
    setStatus("✅ 資料儲存成功");
    setTimeout(() => {
      loadFromSheet();
      clearForm();
    }, 800);
  } catch (err) {
    console.error(err);
    setStatus("❌ 儲存失敗", true);
  }
};

// 清空表單
const clearForm = () => {
  document.getElementById("density").value = "";
  document.getElementById("temp").value = "";
  document.getElementById("user").value = "";
  document.getElementById("note").value = "";
  document.getElementById("otherUnit").value = "";
  document.getElementById("unit").value = "原液坑一";
  document.getElementById("otherUnit").style.display = "none";
  editIndex = -1;
  setEditTip("");
};

// 其他單元顯示切換
document.getElementById("unit").addEventListener("change", function(){
  document.getElementById("otherUnit").style.display = this.value === "其他" ? "inline-block" : "none";
});

// 初始化
window.onload = async () => {
  initDateTime();
  await loadFromSheet();
};
</script>
</body>
</html>
