<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NaCl-Na₂SO₄-H₂O Ternary Phase Diagram 75/80/85℃</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:"PingFang TC","Heiti TC",sans-serif; background:#f4f6f8; padding:12px;}
h1{font-size:18px; text-align:center; color:#2c3e50; margin-bottom:8px; line-height:1.3;}
.info{font-size:13px; color:#555; text-align:center; margin-bottom:12px; line-height:1.4;}
.card{background:white; border-radius:10px; padding:12px; box-shadow:0 0 8px rgba(0,0,0,0.08); margin-bottom:15px;}
canvas{width:100% !important; height:62vh !important; max-height:550px;}
.query-section{background:white; border-radius:10px; padding:15px; box-shadow:0 0 8px rgba(0,0,0,0.08); margin-bottom:12px;}
.query-title{font-size:15px; color:#2c3e50; margin-bottom:10px; font-weight:600;}
.temp-select{width:100%; padding:8px 10px; border:1px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:10px;}
.query-btn{width:100%; padding:10px; background:#3498db; color:white; border:none; border-radius:6px; font-size:14px; cursor:pointer;}
.query-btn:hover{background:#2980b9;}
.result-table{width:100%; border-collapse:collapse; margin-top:15px; font-size:13px;}
.result-table th, .result-table td{border:1px solid #eee; padding:8px; text-align:center;}
.result-table th{background:#f8f9fa; color:#2c3e50;}
.result-table tr:nth-child(even){background:#f8f9fa;}
</style>
</head>
<body>

<!-- 頁面標題已改英文 -->
<h1>NaCl-Na₂SO₄-H₂O Ternary Saturation Phase Diagram<br>75/80/85℃ | Dry-Base Salt Ratio</h1>
<div class="info">
X: Liquid NaCl (%)　Y: Liquid Na₂SO₄ (%)<br>
Ratio = Mass Ratio of Crystalline Dry Solid Salt | Blue 75℃ / Green 80℃ / Red 85℃<br>
<br>
Author: Chung, Chang-Yen (2026). Taipei, Taiwan.
</div>

<div class="query-section">
  <div class="query-title">Query Data on Diagonal Line (Ratio 0~10)</div>
  <select class="temp-select" id="tempSelect">
    <option value="">Select Temperature</option>
    <option value="75℃">75℃</option>
    <option value="80℃">80℃</option>
    <option value="85℃">85℃</option>
    <option value="all">All Temperatures</option>
  </select>
  <button class="query-btn" id="queryBtn">Query Data</button>
  <div id="resultContainer"></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
const ctx = document.getElementById('chart').getContext('2d');
const bound75 = { color:"#3498db", label:"75℃ Saturation Boundary", pts:[{x:0,y:0},{x:26.7,y:0},{x:24.8,y:5.5},{x:0,y:31.8}] };
const bound80 = { color:"#2ecc71", label:"80℃ Saturation Boundary", pts:[{x:0,y:0},{x:26.8,y:0},{x:24.5,y:5.2},{x:0,y:31.5}] };
const bound85 = { color:"#e74c3c", label:"85℃ Saturation Boundary", pts:[{x:0,y:0},{x:26.9,y:0},{x:24.2,y:4.9},{x:0,y:31.2}] };

const points = [
  {ratio:"0:10",t:"75℃",x:0.00,y:31.80,rho:1.272,dTb:5.00,c:"#3498db"},
  {ratio:"1:9",t:"75℃",x:3.16,y:28.45,rho:1.265,dTb:5.31,c:"#3498db"},
  {ratio:"2:8",t:"75℃",x:6.32,y:25.10,rho:1.258,dTb:5.62,c:"#3498db"},
  {ratio:"3:7",t:"75℃",x:9.37,y:21.86,rho:1.253,dTb:5.82,c:"#3498db"},
  {ratio:"4:6",t:"75℃",x:14.61,y:20.85,rho:1.282,dTb:7.57,c:"#3498db"},
  {ratio:"5:5",t:"75℃",x:19.84,y:19.84,rho:1.312,dTb:9.32,c:"#3498db"},
  {ratio:"6:4",t:"75℃",x:22.30,y:14.87,rho:1.280,dTb:8.03,c:"#3498db"},
  {ratio:"7:3",t:"75℃",x:23.26,y:9.97,rho:1.252,dTb:7.72,c:"#3498db"},
  {ratio:"8:2",t:"75℃",x:24.49,y:6.91,rho:1.230,dTb:7.23,c:"#3498db"},
  {ratio:"9:1",t:"75℃",x:25.71,y:2.86,rho:1.209,dTb:6.74,c:"#3498db"},
  {ratio:"10:0",t:"75℃",x:26.70,y:0.00,rho:1.190,dTb:6.30,c:"#3498db"},

  {ratio:"0:10",t:"80℃",x:0.00,y:31.50,rho:1.268,dTb:4.85,c:"#2ecc71"},
  {ratio:"1:9",t:"80℃",x:3.00,y:28.00,rho:1.262,dTb:5.15,c:"#2ecc71"},
  {ratio:"2:8",t:"80℃",x:6.00,y:24.80,rho:1.255,dTb:5.45,c:"#2ecc71"},
  {ratio:"3:7",t:"80℃",x:9.10,y:21.50,rho:1.250,dTb:5.65,c:"#2ecc71"},
  {ratio:"4:6",t:"80℃",x:14.30,y:20.50,rho:1.278,dTb:7.35,c:"#2ecc71"},
  {ratio:"5:5",t:"80℃",x:19.50,y:19.50,rho:1.308,dTb:8.80,c:"#2ecc71"},
  {ratio:"6:4",t:"80℃",x:21.90,y:14.60,rho:1.276,dTb:7.80,c:"#2ecc71"},
  {ratio:"7:3",t:"80℃",x:22.80,y:9.70,rho:1.248,dTb:7.47,c:"#2ecc71"},
  {ratio:"8:2",t:"80℃",x:24.05,y:6.70,rho:1.226,dTb:6.95,c:"#2ecc71"},
  {ratio:"9:1",t:"80℃",x:24.30,y:2.70,rho:1.202,dTb:6.23,c:"#2ecc71"},
  {ratio:"10:0",t:"80℃",x:26.80,y:0.00,rho:1.186,dTb:6.15,c:"#2ecc71"},

  {ratio:"0:10",t:"85℃",x:0.00,y:31.20,rho:1.265,dTb:4.70,c:"#e74c3c"},
  {ratio:"1:9",t:"85℃",x:2.90,y:27.60,rho:1.259,dTb:5.02,c:"#e74c3c"},
  {ratio:"2:8",t:"85℃",x:5.80,y:24.50,rho:1.252,dTb:5.33,c:"#e74c3c"},
  {ratio:"3:7",t:"85℃",x:8.90,y:21.20,rho:1.247,dTb:5.51,c:"#e74c3c"},
  {ratio:"4:6",t:"85℃",x:14.05,y:20.15,rho:1.274,dTb:7.15,c:"#e74c3c"},
  {ratio:"5:5",t:"85℃",x:19.20,y:19.20,rho:1.304,dTb:8.55,c:"#e74c3c"},
  {ratio:"6:4",t:"85℃",x:21.55,y:14.37,rho:1.272,dTb:7.55,c:"#e74c3c"},
  {ratio:"7:3",t:"85℃",x:22.40,y:9.40,rho:1.244,dTb:7.25,c:"#e74c3c"},
  {ratio:"8:2",t:"85℃",x:23.65,y:6.50,rho:1.222,dTb:6.70,c:"#e74c3c"},
  {ratio:"9:1",t:"85℃",x:23.90,y:2.66,rho:1.198,dTb:6.09,c:"#e74c3c"},
  {ratio:"10:0",t:"85℃",x:26.90,y:0.00,rho:1.182,dTb:6.00,c:"#e74c3c"}
];

const datasets = [];
[bound75,bound80,bound85].forEach(b=>{
  datasets.push({
    label:b.label,data:b.pts,borderColor:b.color,backgroundColor:"transparent",
    borderWidth:2,pointRadius:3,showLine:true,fill:false
  });
});
datasets.push({
  label:"Dry-Base Ratio Crystallization Points",
  data:points.map(p=>({x:p.x,y:p.y,ratio:p.ratio,t:p.t,rho:p.rho,dTb:p.dTb})),
  backgroundColor:points.map(p=>p.c),pointRadius:6,pointStyle:"circle"
});

new Chart(ctx,{
  type:"scatter",
  data:{datasets},
  options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{position:"top",labels:{font:{size:11}}},
      tooltip:{
        backgroundColor:"rgba(0,0,0,0.7)",
        titleFont:{size:14},bodyFont:{size:13},
        callbacks:{label:it=>{
          const d=it.raw;
          return [
            `Dry-Base Ratio: ${d.ratio}`,
            `Temperature: ${d.t}`,
            `NaCl: ${d.x}%`,
            `Na₂SO₄: ${d.y}%`,
            `Density: ${d.rho}`,
            `ΔTb: ${d.dTb}℃`
          ];
        }}
      }
    },
    scales:{
      x:{title:{display:true,text:"NaCl Liquid Phase (%)",font:{size:12}},min:0,max:32,ticks:{font:{size:11}}},
      y:{title:{display:true,text:"Na₂SO₄ Liquid Phase (%)",font:{size:12}},min:0,max:35,ticks:{font:{size:11}}}
    }
  }
});

document.getElementById('queryBtn').addEventListener('click', function() {
  const tempSelect = document.getElementById('tempSelect');
  const selectedTemp = tempSelect.value;
  const resultContainer = document.getElementById('resultContainer');
  
  resultContainer.innerHTML = '';
  
  if (!selectedTemp) {
    resultContainer.innerHTML = '<div style="color:#e74c3c; text-align:center; margin-top:10px;">Please select a temperature!</div>';
    return;
  }
  
  let filteredPoints = [];
  if (selectedTemp === 'all') {
    filteredPoints = [...points];
  } else {
    filteredPoints = points.filter(point => point.t === selectedTemp);
  }
  
  if (filteredPoints.length === 0) {
    resultContainer.innerHTML = '<div style="color:#7f8c8d; text-align:center; margin-top:10px;">No data found!</div>';
    return;
  }
  
  const table = document.createElement('table');
  table.className = 'result-table';
  
  const thead = document.createElement('thead');
  thead.innerHTML = `
    <tr>
      <th>Dry-Base Ratio</th>
      <th>Temp.</th>
      <th>NaCl Liquid (%)</th>
      <th>Na₂SO₄ Liquid (%)</th>
      <th>Density</th>
      <th>ΔTb (℃)</th>
    </tr>
  `;
  table.appendChild(thead);
  
  const tbody = document.createElement('tbody');
  filteredPoints.forEach(point => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${point.ratio}</td>
      <td>${point.t}</td>
      <td>${point.x}</td>
      <td>${point.y}</td>
      <td>${point.rho}</td>
      <td>${point.dTb}</td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  
  resultContainer.appendChild(table);
});
</script>
</body>
</html>
