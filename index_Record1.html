<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比重溫度記錄表</title>
    <style>
        *{box-sizing:border-box;font-family:"Microsoft JhengHei",sans-serif}
        body{margin:10px;background:#f5f5f5}
        .container{max-width:1000px;margin:auto;background:white;padding:15px;border-radius:8px}
        .form-group{margin:10px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        label{font-weight:bold;min-width:fit-content;margin-right:5px}
        select,input{padding:6px;border:1px solid #ccc;border-radius:4px;font-size:16px}
        .btn{padding:8px 14px;margin:5px 3px;border:none;border-radius:5px;color:white;cursor:pointer}
        .btn-confirm{background:#4CAF50}
        .btn-refresh{background:#ff9800}
        .btn-clear{background:#607D8B}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #333;padding:8px;text-align:center}
        th{background:#eaeaea}
        tr:hover{background:#f0f8ff;cursor:pointer}
        .status{padding:8px;border-radius:5px;margin-bottom:10px}
        .success{background:#e8f5e9;color:#2e7d32}
        .error{background:#ffebee;color:#c62828}
        #otherUnit{display:none}
        .edit-info{color:#1a73e8;font-size:14px;margin-bottom:8px}
    </style>
</head>
<body>
<div class="container">
    <h2>比重 / 溫度記錄表</h2>
    <div id="editTip" class="edit-info"></div>
    <div id="status" class="status">讀取中...</div>

    <div class="form-group">
        <label>測量日期：</label>
        <select id="year"></select> / <select id="month"></select> / <select id="day"></select>
    </div>
    <div class="form-group">
        <label>測量時間：</label>
        <select id="hour"></select> : <select id="minute"></select>
    </div>
    <div class="form-group">
        <label>單元名稱：</label>
        <select id="unit">
            <option value="原液坑一">原液坑一</option>
            <option value="原液坑二">原液坑二</option>
            <option value="VVCC#A">VVCC#A</option>
            <option value="VVCC#B">VVCC#B</option>
            <option value="VVCC#C">VVCC#C</option>
            <option value="結晶罐#A">結晶罐#A</option>
            <option value="結晶罐#B">結晶罐#B</option>
            <option value="結晶罐#C">結晶罐#C</option>
            <option value="濃縮液槽">濃縮液槽</option>
            <option value="應急坑">應急坑</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" id="otherUnit" placeholder="自訂單元">
    </div>
    <div class="form-group">
        <label>比重：</label>
        <input type="number" step="0.001" id="density" placeholder="例：1.025">
    </div>
    <div class="form-group">
        <label>溫度：</label>
        <input type="number" id="temp" placeholder="例：28">
    </div>
    <div class="form-group">
        <label>測量者：</label>
        <input type="text" id="user" placeholder="姓名">
    </div>
    <div class="form-group">
        <label>備註：</label>
        <input type="text" id="note" placeholder="請輸入備註">
    </div>

    <button class="btn btn-confirm" onclick="saveData()">確認送出</button>
    <button class="btn btn-refresh" onclick="loadFromSheet()">重新整理</button>
    <button class="btn btn-clear" onclick="clearForm()">取消編輯</button>

    <table>
        <thead>
            <tr>
                <th>日期</th><th>時間</th><th>單元</th><th>比重</th><th>溫度</th><th>測量者</th><th>備註</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
// ======================
// 請替換成你自己的 Google Apps Script 部署網址
// ======================
const API_URL = "https://script.google.com/macros/s/AKfycbwqHKAORCbeF8iedyq_HtNB6nL1oda7HU9AlHhx-8uvWOip99hSWjn5DmuQMOS2rCET/exec";

let records = [];
let editIndex = -1;

// 狀態提示
const setStatus = (msg, err=false) => {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = err ? "status error" : "status success";
};
const setEditTip = (msg) => document.getElementById("editTip").textContent = msg;

// 日期時間下拉選單初始化
const initDateTime = () => {
  const now = new Date();
  const roc = now.getFullYear() - 1911; // 民國年
  const pad = n => String(n).padStart(2, "0"); // 補零函數

  // 年（民國年，前後各2年）
  const yearSel = document.getElementById("year");
  for(let i = roc - 2; i <= roc + 1; i++){
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i;
    if(i === roc) opt.selected = true;
    yearSel.appendChild(opt);
  }

  // 月（01-12）
  const monthSel = document.getElementById("month");
  for(let i = 1; i <= 12; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === now.getMonth() + 1) opt.selected = true;
    monthSel.appendChild(opt);
  }

  // 日（01-31）
  const daySel = document.getElementById("day");
  for(let i = 1; i <= 31; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === now.getDate()) opt.selected = true;
    daySel.appendChild(opt);
  }

  // 時（00-23）
  const hourSel = document.getElementById("hour");
  for(let i = 0; i < 24; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === now.getHours()) opt.selected = true;
    hourSel.appendChild(opt);
  }

  // 分（00-59）
  const minSel = document.getElementById("minute");
  for(let i = 0; i < 60; i++){
    const v = pad(i);
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    if(i === Math.floor(now.getMinutes() / 10) * 10) opt.selected = true;
    minSel.appendChild(opt);
  }
};

// 表格渲染（直接用索引取值，避免 undefined）
const renderTable = () => {
  const tb = document.getElementById("tableBody");
  tb.innerHTML = records.map((row, idx) => `
    <tr onclick="editRow(${idx})">
      <td>${row[0] || ""}</td>
      <td>${row[1] || ""}</td>
      <td>${row[2] || ""}</td>
      <td>${row[3] || ""}</td>
      <td>${row[4] || ""}</td>
      <td>${row[5] || ""}</td>
      <td>${row[6] || ""}</td>
    </tr>
  `).join("");
};

// 編輯列
const editRow = (idx) => {
  editIndex = idx;
  const row = records[idx];
  if (!row) return;
  
  const [dateStr, timeStr, unitStr, densityStr, tempStr, userStr, noteStr] = row;
  const [y, m, d] = (dateStr || "").split("/");
  const [h, mi] = (timeStr || "").split(":");

  // 填入表單
  document.getElementById("year").value = y || new Date().getFullYear() - 1911;
  document.getElementById("month").value = m || String(new Date().getMonth() + 1).padStart(2, "0");
  document.getElementById("day").value = d || String(new Date().getDate()).padStart(2, "0");
  document.getElementById("hour").value = h || String(new Date().getHours()).padStart(2, "0");
  document.getElementById("minute").value = mi || "00";
  document.getElementById("density").value = densityStr || "";
  document.getElementById("temp").value = tempStr || "";
  document.getElementById("user").value = userStr || "";
  document.getElementById("note").value = noteStr || "";

  // 單元處理
  const unit = unitStr || "";
  if(unit.startsWith("其他(")){
    document.getElementById("unit").value = "其他";
    document.getElementById("otherUnit").style.display = "inline-block";
    document.getElementById("otherUnit").value = unit.replace(/其他\((.*?)\)/, "$1");
  } else {
    document.getElementById("unit").value = unit || "原液坑一";
    document.getElementById("otherUnit").style.display = "none";
    document.getElementById("otherUnit").value = "";
  }

  setEditTip(`正在編輯第 ${idx + 1} 筆資料`);
};

// 讀取試算表資料
const loadFromSheet = async () => {
  setStatus("讀取中...");
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "load" })
    });
    const json = await res.json();
    if(json.status === "ok"){
      records = json.data;
      renderTable();
      setStatus(`✅ 已成功載入 ${records.length} 筆資料`);
    } else {
      setStatus("⚠️ 資料讀取失敗", true);
    }
  } catch (err) {
    console.error(err);
    setStatus("❌ 網路連線失敗，請檢查網路", true);
  }
};

// 儲存資料（強制文字格式傳送）
const saveData = async () => {
  const pad = n => String(n).padStart(2, "0");
  const year = document.getElementById("year").value;
  const month = document.getElementById("month").value;
  const day = document.getElementById("day").value;
  const hour = document.getElementById("hour").value;
  const minute = document.getElementById("minute").value;

  // 強制格式化為 115/04/05 和 15:30
  const dateStr = `${year}/${month}/${day}`;
  const timeStr = `${hour}:${minute}`;

  let unit = document.getElementById("unit").value;
  const otherUnit = document.getElementById("otherUnit").value.trim();
  const density = document.getElementById("density").value.trim();
  const temp = document.getElementById("temp").value.trim();
  const user = document.getElementById("user").value.trim();
  const note = document.getElementById("note").value.trim();

  // 欄位檢查
  if(unit === "其他" && !otherUnit) return alert("請輸入自訂單元名稱");
  if(!density || !temp || !user) return alert("請填寫所有必填欄位");
  if(unit === "其他") unit = `其他(${otherUnit})`;

  // 組成資料物件
  const data = {
    date: dateStr,
    time: timeStr,
    unit: unit,
    density: density,
    temp: temp,
    user: user,
    note: note
  };

  // 判斷是新增還是修改
  const action = editIndex >= 0 ? "update" : "add";
  if(action === "update") data.rowIndex = editIndex;

  // 送出資料
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action, ...data })
  });

  // 重新讀取並清空表單
  await loadFromSheet();
  clearForm();
};

// 清空表單
const clearForm = () => {
  document.getElementById("density").value = "";
  document.getElementById("temp").value = "";
  document.getElementById("user").value = "";
  document.getElementById("note").value = "";
  document.getElementById("otherUnit").value = "";
  document.getElementById("unit").value = "原液坑一";
  document.getElementById("otherUnit").style.display = "none";
  editIndex = -1;
  setEditTip("");
};

// 其他單元顯示切換
document.getElementById("unit").addEventListener("change", function(){
  document.getElementById("otherUnit").style.display = this.value === "其他" ? "inline-block" : "none";
});

// 初始化
window.onload = async () => {
  initDateTime();
  await loadFromSheet();
};
</script>
</body>
</html>
